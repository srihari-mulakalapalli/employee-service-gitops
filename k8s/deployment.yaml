apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-service
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: employee-service
  template:
    metadata:
      labels:
        app: employee-service
    spec:
      containers:
      - name: employee-service
        image: srihari25/employee-service:13
        ports:
        - containerPort: 8080
